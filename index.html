    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='48' fill='%23B5944E' opacity='0.15'/><rect x='20' y='45' width='6' height='10' rx='3' fill='%23B5944E' opacity='0.4'/><rect x='32' y='35' width='6' height='30' rx='3' fill='%23B5944E' opacity='0.6'/><rect x='44' y='20' width='6' height='60' rx='3' fill='%23B5944E'/><rect x='56' y='30' width='6' height='40' rx='3' fill='%23B5944E' opacity='0.8'/><rect x='68' y='40' width='6' height='20' rx='3' fill='%23B5944E' opacity='0.5'/><rect x='80' y='45' width='6' height='10' rx='3' fill='%23B5944E' opacity='0.3'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              gold: {
                main: 'var(--brand-primary, #B5944E)',      
                accent: '#D4AF37',    
                glow: 'rgba(181, 148, 78, 0.4)',
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
              mono: ['Fira Code', 'monospace'],
            },
            animation: {
              'pulse-gold': 'pulseGold 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'sonar-ping': 'sonarPing 4s linear infinite',
            },
            keyframes: {
              pulseGold: {
                '0%, 100%': { opacity: '1', transform: 'scale(1)' },
                '50%': { opacity: '0.7', transform: 'scale(0.98)' },
              },
              sonarPing: {
                '0%': { transform: 'scale(0.8)', opacity: '0.8' },
                '100%': { transform: 'scale(1.5)', opacity: '0' },
              }
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,700;1,700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --gold-glow: rgba(181, 148, 78, 0.2);
        --slate-deep: #020617;
      }
      body {
        background-color: var(--slate-deep);
        color: #F8FAFC;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
      }
      .crt-overlay {
        position: relative;
        overflow: hidden;
      }
      .crt-overlay::after {
        content: " ";
        display: block;
        position: absolute;
        top: 0; left: 0; bottom: 0; right: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
        z-index: 2;
        background-size: 100% 4px, 6px 100%;
        pointer-events: none;
      }
      .glass-dossier {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }
      .sonar-grid {
        background-image: radial-gradient(var(--gold-glow) 1px, transparent 1px);
        background-size: 40px 40px;
      }
      .custom-scrollbar::-webkit-scrollbar { width: 4px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: #B5944E; border-radius: 10px; }
    </style>
